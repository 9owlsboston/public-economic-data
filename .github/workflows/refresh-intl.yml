name: Refresh International Financials

on:
  schedule:
    # Run quarterly on Jan/Apr/Jul/Oct 20 at 10:00 UTC
    # Offset from SEC (15th) and Macro (5th) to spread load
    - cron: '0 10 20 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      isin:
        description: 'Optional: refresh a single company by ISIN (e.g., DE0007236101)'
        required: false
        type: string

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml yfinance

      - name: Refresh international financials
        run: |
          if [ -n "${{ inputs.isin }}" ]; then
            python intl/scripts/refresh_intl.py --isin "${{ inputs.isin }}"
          else
            python intl/scripts/refresh_intl.py
          fi

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh international financials [automated]"
          file_pattern: "intl/financials/*.json"
